{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}

<div class="auth">
    <div class="card auth__card">
        <div class="card__body">
            <h1 class="auth__title">Welcome back</h1>
            <p class="auth__subtitle">Sign in to plan your next cocktail night.</p>
            <form method="POST" class="form-stack">
                <div class="field">
                    <label class="field__label" for="email">Email Address</label>
                    <input class="input" type="email" id="email" name="email" placeholder="you@example.com" required
                        autofocus />
                </div>
                <div class="field">
                    <label class="field__label" for="password">Password</label>
                    <input class="input" type="password" id="password" name="password" placeholder="••••••••"
                        required />
                </div>
                <button type="submit" class="btn btn--lg btn--block">Login</button>
            </form>
            <p class="auth__footer">
                New here? <a href="/sign-up">Create an account</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
