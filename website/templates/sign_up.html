{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}

<div class="auth">
    <div class="card auth__card">
        <div class="card__body">
            <h1 class="auth__title">Create your account</h1>
            <p class="auth__subtitle">Start planning cocktails in seconds.</p>
            <form method="POST" class="form-stack">
                <div class="field">
                    <label class="field__label" for="email">Email Address</label>
                    <input class="input" type="email" id="email" name="email" placeholder="you@example.com" required />
                </div>
                <div class="field">
                    <label class="field__label" for="firstName">First Name</label>
                    <input class="input" type="text" id="firstName" name="firstName" placeholder="Alex" required />
                </div>
                <div class="form-grid">
                    <div class="field col-6">
                        <label class="field__label" for="password1">Password</label>
                        <input class="input" type="password" id="password1" name="password1" placeholder="••••••••"
                            required />
                    </div>
                    <div class="field col-6">
                        <label class="field__label" for="password2">Confirm</label>
                        <input class="input" type="password" id="password2" name="password2" placeholder="••••••••"
                            required />
                    </div>
                </div>
                <button type="submit" class="btn btn--lg btn--block">Create account</button>
            </form>
            <p class="auth__footer">
                Already have an account? <a href="/login">Login</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
